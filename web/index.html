<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>PlantWatch</title>
  <meta name="theme-color" content="#1b4332" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icon-180.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="PlantWatch" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="hdr">
    <div class="hdr-row">
      <h1>🌱 PlantWatch</h1>
      <button id="refresh" class="btn" aria-label="Refresh">↻</button>
    </div>
    <p id="meta" class="meta">Loading…</p>
    <div id="weather" class="weather hidden"></div>
    <div id="summary" class="summary hidden"></div>
  </header>

  <main id="main">
    <div id="loading" class="status-msg">Fetching the latest readings…</div>
  </main>

  <footer class="ftr">
    <button id="toggle-setup" class="link">Show channel-mapping helper</button>
  </footer>

  <script src="config.js"></script>
  <script src="app.js"></script>
</body>
</html>
